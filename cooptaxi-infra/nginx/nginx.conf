server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;

    # Assets estáticos — cache 1 año (Vite les pone hash al nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker — sin cache para que siempre sea el más reciente
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Manifest PWA
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # SPA — todas las rutas van a index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
