version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cooptaxi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cooptaxi
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: cooptaxi_db
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cooptaxi_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  # Interfaz visual para Redis (opcional, útil para inspeccionar la cola Bull)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cooptaxi_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis

volumes:
  pgdata:
  redisdata:
